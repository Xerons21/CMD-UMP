name: Update LinkedIn Feed

on:
  workflow_dispatch:   # pozwala uruchamiać ręcznie
  schedule:
    - cron: '0 */4 * * *'  # co 4h

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install node-fetch

      - run: node cmd-linkedin-feed/scraper.js

      - name: Commit changes
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add linkedin.json
          git commit -m "update feed" || exit 0
          git push