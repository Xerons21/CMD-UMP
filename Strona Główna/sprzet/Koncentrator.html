  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'pl',
        autoDisplay: false
      }, 'google_translate_element');
    }

    function translateTo(lang) {
      const select = document.querySelector('.goog-te-combo');

      if (lang === 'pl') {
        if (select && select.value && select.value !== '') {
          location.href = location.pathname + location.search + location.hash;
          return;
        }
      } else {
        if (select) {
          const option = Array.from(select.options).find(function(opt) {
            return opt.value.startsWith(lang);
          });
          if (option) {
            select.value = option.value;
            select.dispatchEvent(new Event('change'));
          }
        }
      }

      document.querySelectorAll('.lang-option').forEach(function(el) {
        el.classList.remove('active');
      });

      const activeBtn = document.querySelector('.lang-option[data-lang="' + lang + '"]');
      if (activeBtn) activeBtn.classList.add('active');
    }

    window.addEventListener('DOMContentLoaded', function() {
      const select = document.querySelector('.goog-te-combo');
      if (select && select.value && select.value !== '') {
        const lang = select.value.startsWith('en') ? 'en' : 'pl';
        translateTo(lang);
      } else {
        translateTo('pl');
      }
    });
  </script>

    function parseNestedList(text) {
      const lines = text.split('\n').map(function(line) { return line.replace(/\t/g, '  '); });
      const root = { indent: -1, items: [] };
      const stack = [root];

      lines.forEach(function(rawLine) {
        if (!rawLine.trim()) return;
        const match = rawLine.match(/^(\s*)-\s+(.*)$/);

        if (!match) {
          const htmlMatch = rawLine.match(/^(\s*)(<[\s\S]*>)\s*$/);
          if (htmlMatch) {
            const indent = htmlMatch[1].length;
            const htmlValue = htmlMatch[2].trim();
            const item = { text: htmlValue, children: [], noBullet: true };

            while (stack.length > 1 && indent <= stack[stack.length - 1].indent) {
              stack.pop();
            }

            stack[stack.length - 1].items.push(item);
            return;
          }

          const top = stack[stack.length - 1];
          const last = top.items[top.items.length - 1];
          if (last) last.text += '<br>' + rawLine.trim();
          return;
        }

        const indent = match[1].length;
        const textValue = match[2].trim();
        const item = { text: textValue, children: [] };

        while (stack.length > 1 && indent <= stack[stack.length - 1].indent) {
          stack.pop();
        }

        stack[stack.length - 1].items.push(item);
        stack.push({ indent: indent, items: item.children });
      });

      return root.items;
    }

    function buildListElement(items, bulletColor, isNested) {
      const ul = document.createElement('ul');
      ul.style.color = '#2c3e50';
      ul.style.margin = isNested ? '8px 0 0 0' : '0';
      ul.style.paddingLeft = isNested ? '28px' : '20px';
      ul.style.listStyleType = 'none';

      items.forEach(function(item) {
        const li = document.createElement('li');
        li.style.margin = '8px 0';
        li.style.position = 'relative';

        const bullet = document.createElement('span');
        bullet.textContent = '•';
        bullet.style.color = bulletColor;
        bullet.style.position = 'absolute';
        bullet.style.left = '-20px';
        if (item.noBullet) bullet.style.display = 'none';

        const text = document.createElement('span');
        text.innerHTML = item.text;

        li.appendChild(bullet);
        li.appendChild(text);

        if (item.children && item.children.length) {
          li.appendChild(buildListElement(item.children, bulletColor, true));
        }

        ul.appendChild(li);
      });

      return ul;
    }

      function getRightIcon(type) {
        if (type === 'pdf') return 'https://cdn-icons-png.flaticon.com/512/724/724933.png';
        return 'https://cdn-icons-png.flaticon.com/512/271/271228.png';
      }

      function getSubtitle(link) {
        if (link.subtitle) return link.subtitle;
        return link.type === 'pdf' ? 'Pobierz plik PDF' : 'Przejdz do strony zewnetrznej';
      }

      function getLeftIconBg(type) {
        return 'rgba(231,76,60,0.1)';
      }

      CONTENT.links.forEach(function(link) {
        const a = document.createElement('a');
        a.href = link.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.style.background = 'rgba(255,255,255,0.7)';
        a.style.padding = '12px';
        a.style.borderRadius = '10px';
        a.style.textDecoration = 'none';
        a.style.color = '#2c3e50';
        a.style.display = 'flex';
        a.style.alignItems = 'center';
        a.style.boxShadow = '0 3px 6px rgba(0,0,0,0.1)';
        a.style.transition = 'transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease';

        a.innerHTML =
          '<img src="' + getLeftIcon(link.type) + '" alt="link icon" style="width: 36px; height: 36px; margin-left: -4px; margin-right: 10px; padding: 6px; background: ' + getLeftIconBg(link.type) + '; border-radius: 50%;">' +
          '<span style="flex: 1; text-align: left;">' +
            '<span style="font-size: clamp(0.8em, 2vw, 0.85em); display: block; margin-bottom: 3px;">' + link.title + '</span>' +
            '<span style="font-size: 0.75em; color: #7f8c8d; display: block;">' + getSubtitle(link) + '</span>' +
          '</span>' +
          '<img src="' + getRightIcon(link.type) + '" alt="action icon" style="width: 18px; height: 18px; margin-left: 10px;">';

        a.addEventListener('mouseover', function() {
          a.style.boxShadow = '0 10px 20px rgba(35,183,245,0.4)';
          a.style.transform = 'scale(1.01)';
          a.style.background = 'rgba(250, 255, 255, 0.7)';
        });

        a.addEventListener('mouseout', function() {
          a.style.boxShadow = '0 3px 6px rgba(0,0,0,0.1)';
          a.style.transform = 'scale(1)';
          a.style.background = 'rgba(255,255,255,0.7)';
        });

        linksGrid.appendChild(a);
      });
    }

    function openModalByIndex(index) {
      if (!images.length) return;
      currentIndex = index;
      const modal = document.getElementById('myModal');
      const modalImg = document.getElementById('modalImg');
      const imageCounter = document.getElementById('imageCounter');
      modal.style.display = 'block';
      modalImg.src = images[currentIndex];
      imageCounter.textContent = (currentIndex + 1) + '/' + images.length;
    }

    function closeModal() {
      document.getElementById('myModal').style.display = 'none';
    }

    function changeImage(direction) {
      if (!images.length) return;
      currentIndex += direction;
      if (currentIndex < 0) currentIndex = images.length - 1;
      if (currentIndex >= images.length) currentIndex = 0;

      const modalImg = document.getElementById('modalImg');
      const imageCounter = document.getElementById('imageCounter');
      modalImg.src = images[currentIndex];
      imageCounter.textContent = (currentIndex + 1) + '/' + images.length;
    }

    function renderPage() {
      document.getElementById('intro-text').innerHTML = CONTENT.introHtml;

      const specItems = parseNestedList(CONTENT.specificationList || '');
      const appItems = parseNestedList(CONTENT.applicationsList || '');

      const specContainer = document.getElementById('specification-list');
      const appContainer = document.getElementById('applications-list');
      specContainer.innerHTML = '';
      appContainer.innerHTML = '';

      specContainer.appendChild(buildListElement(specItems, '#27ae60', false));
      appContainer.appendChild(buildListElement(appItems, '#f1c40f', false));

      renderGallery();
      renderGalleryVideos();
      renderLinks();
    }

    window.addEventListener('load', function() {
      renderPage();
      document.fonts.ready.then(function() {
        const offsetHeight = document.body.offsetHeight;
        window.parent.postMessage({ type: 'iframeHeight', height: offsetHeight }, '*');
      });
    });
  </script>
